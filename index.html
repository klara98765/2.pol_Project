<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <style src="style.css"></style>
    <title>Document</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark justify-content-between">
        <a id="navbar" class="navbar-brand text-light">Movie Mood Finder</a>
        <button class="navbar-toggler" type="button" id="list">Watchlist</button>
        <form class="form-inline" id="searchForm">
            <input id="searchInput" class="form-control mr-sm-2" type="search" placeholder="Search" aria-label="Search">
            <button class="btn btn-outline-info my-2 my-sm-0 text-info" type="submit">Search</button>
        </form>
    </nav>
    <div class="container mt-4">
        <div id="movies" class="row g-lg-5"></div>
        <button type="button" class="btn btn-primary" id="button333">Random film</button>
        <div class="dropdown">
            <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenu2" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                Mood filter
            </button>
            <div class="dropdown-menu" aria-labelledby="dropdownMenu2">
                <button class="dropdown-item mood" type="button">dark</button>
                <button class="dropdown-item mood" type="button">emotional</button>
                <button class="dropdown-item mood" type="button">comforting</button>
                <button class="dropdown-item mood" type="button">chaotic</button>
                <button class="dropdown-item mood" type="button">weird</button>
                <button class="dropdown-item mood" type="button">mysterious</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
